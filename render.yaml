services:
  - type: web
    name: bulkhub-store
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: VITE_STRIPE_PUBLIC_KEY
        sync: false
      - key: VITE_KIMI_AUTH_URL
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: VITE_BASE_URL
        value: https://bulkhub-store.onrender.com
